version: '3.8'

services:
  emby:
    image: emby/emby-server:latest
    container_name: emby-server
    restart: unless-stopped
    environment:
      - UID=1000
      - GID=1000
      - GIDLIST=1000
    ports:
      - "8096:8096"
      - "8920:8920"
    volumes:
      - emby-config:/config
      - emby-cache:/cache
      - emby-media:/media
      - emby-metadata:/metadata
    networks:
      - emby-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  emby-nginx:
    image: nginx:alpine
    container_name: emby-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - emby
    networks:
      - emby-network

networks:
  emby-network:
    driver: bridge

volumes:
  emby-config:
    driver: local
  emby-cache:
    driver: local
  emby-media:
    driver: local
  emby-metadata:
    driver: local